<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Ocean Monitoring Dashboard</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chroma-js/2.4.2/chroma.min.js"></script>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.highcharts.com/stock/highstock.js"></script>
    <script src="https://code.highcharts.com/stock/modules/data.js"></script>
  </head>
  <body style="background: #f4f4f4; padding: 20px; font-family: sans-serif">
    <h1 style="text-align: center">Real-Time Ocean Temperature</h1>

    <div
      id="container_temp"
      style="
        height: 500px;
        width: 100%;
        border: 1px solid #ccc;
        background: white;
        margin-bottom: 30px;
      "
    ></div>

    <h2 style="text-align: center">Observation Stations</h2>

    <div
      id="container_map"
      style="
        height: 450px;
        width: 100%;
        border: 1px solid #ccc;
        border-radius: 8px;
        background: white;
      "
    ></div>

    <h2 style="text-align: center">AI-Generated Summary</h2>
    <div
      id="ai-summary"
      style="
        width: 100%;
        border: 1px solid #ccc;
        border-radius: 8px;
        background: white;
        padding: 20px;
        margin-bottom: 30px;
        font-size: 16px;
        line-height: 1.6;
      "
    >
      Loading summary...
    </div>

    <script>
      // Fetch AI summary from backend
      fetch('https://3-15-176-0.sslip.io/summary')
        .then(response => response.json())
        .then(data => {
          document.getElementById('ai-summary').innerHTML = data.ai_summary || 'No summary available';
        })
        .catch(error => {
          document.getElementById('ai-summary').innerHTML = 'Error loading summary: ' + error.message;
        });
    </script>

    <script src="/static/jsFuns.js"></script>
    <script src="/static/map.js"></script>
    <script src="/static/chartOptions.js"></script>
    <script src="/static/temp.js"></script>
  </body>
</html>
