<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Ocean Monitoring Dashboard</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chroma-js/2.4.2/chroma.min.js"></script>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.highcharts.com/stock/highstock.js"></script>
    <script src="https://code.highcharts.com/stock/modules/data.js"></script>
  </head>
  <body style="background: #f4f4f4; padding: 20px; font-family: sans-serif">
    <h1 style="text-align: center">Real-Time Ocean Temperature</h1>

    <div
      id="container_temp"
      style="
        height: 500px;
        width: 100%;
        border: 1px solid #ccc;
        background: white;
        margin-bottom: 30px;
      "
    ></div>

    <h2 style="text-align: center">Observation Stations</h2>

    <div
      id="container_map"
      style="
        height: 450px;
        width: 100%;
        border: 1px solid #ccc;
        border-radius: 8px;
        background: white;
      "
    ></div>

    <script>
      // These are the color definitions Jeff Sevadjian's code is looking for
      var cmap = ["#000000", "#333333"];
      var cmapThermal14 = [
        "#00004c",
        "#000080",
        "#0000b3",
        "#0000e6",
        "#2600ff",
        "#6600ff",
        "#a600ff",
        "#e600ff",
        "#ff00d9",
        "#ff0099",
        "#ff0059",
        "#ff0019",
        "#ff2600",
        "#ff6600",
      ];

      // CalCOFI Line coordinates - this prevents errors in map.js
      var calcofi = [
        [32.9, -117.3],
        [34.5, -121.1],
        [35.1, -123.5],
      ];
    </script>

    <script src="/static/jsFuns.js"></script>
    <script src="/static/map.js"></script>
    <script src="/static/chartOptions.js"></script>
    <script src="/static/temp.js"></script>
  </body>
</html>
